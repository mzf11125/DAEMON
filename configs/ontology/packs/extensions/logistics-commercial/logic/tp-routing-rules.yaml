# TP Manual formula consumption — validated on write path via action-type-guard + logic-engine.
rules:
  - id: tp-routing-decision
    allowedDecisionTypes:
      - route_accept
      - route_reject
      - price_override
    requireShipmentRef: true
  - id: tp-price-simulation
    allowedDecisionTypes:
      - shadow_quote
      - shadow_compare
    requireShipmentRef: false
