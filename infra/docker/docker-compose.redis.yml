# Redis for runtime state, agent proposals, schema cache, and monitoring status.
# Usage: docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.redis.yml up -d
# Or use `make up-redis` shorthand.

services:
  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-daemon-redis}"
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-daemon-redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis_data:
