gateway:
  replicas: 2
  port: 3000
  image:
    repository: daemon/api-gateway
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  policyEngineUrl: http://daemon-policy:8090

ingest:
  replicas: 1
  port: 8081
  image:
    repository: daemon/collect-sensing
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    port: 8081

agentWorker:
  replicas: 1
  image:
    repository: daemon/agent-worker
    tag: "0.1.0"
    pullPolicy: IfNotPresent

postgres:
  enabled: true
  url: postgres://daemon:daemon@postgres:5432/daemon

redis:
  enabled: true
  url: redis://redis:6379

nats:
  enabled: true
  url: nats://nats:4222
