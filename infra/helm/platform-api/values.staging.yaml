# Staging override for platform-api.
replicaCount: 1

image:
  digest: ""
  tag: "staging"

config:
  oidcIssuer: "https://staging.supabase.co/auth/v1"
  logLevel: "debug"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

podDisruptionBudget:
  enabled: false
