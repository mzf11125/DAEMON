replicaCount: 2

image:
  repository: ghcr.io/daemon-blockint-tech/console-web
  digest: ""
  tag: "0.1.0"
  pullPolicy: IfNotPresent

config:
  port: "3000"
  nextPublicPlatformApiUrl: "https://api.daemon.example.com"
  nextPublicOntologyServiceUrl: "https://api.daemon.example.com/ontology"
  nextPublicCaseServiceUrl: "https://api.daemon.example.com/cases"
  nextPublicSupabaseUrl: "https://prod.supabase.co"
  nextPublicTenantId: ""

externalSecrets:
  enabled: true
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-cluster
  remoteSecrets:
    - name: console-web-runtime
      keys:
        - NEXT_PUBLIC_SUPABASE_ANON_KEY

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: console.daemon.example.com
      paths: [/]
  tls:
    - secretName: console-web-tls
      hosts: [console.daemon.example.com]

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop: ["ALL"]

probes:
  liveness:
    path: /api/health
    port: 3000
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    path: /api/health
    port: 3000
    initialDelaySeconds: 10
    periodSeconds: 5

networkPolicy:
  enabled: true
  ingress:
    - fromNamespaceLabel: ingress-nginx
      ports: [3000]
  egress:
    # Outbound to Daemon Go services + Supabase (broad CIDR; tighten via FQDN egress controller).
    - toCidr: "0.0.0.0/0"
      ports: [443, 8080, 8081, 8083, 8084]

serviceAccount:
  create: true

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/api/metrics"

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: console-web

affinity: {}
nodeSelector: {}
tolerations: []
