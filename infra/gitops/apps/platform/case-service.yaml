apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: case-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: platform
  sources:
    - repoURL: https://github.com/daemon-blockint-tech/DAEMON.git
      path: infra/helm/case-service
      targetRevision: main
      helm:
        releaseName: case-service
        valueFiles:
          - values.yaml
          - values.staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: daemon-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
