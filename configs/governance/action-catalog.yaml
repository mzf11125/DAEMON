  # ---- PPATK governed actions (UU 8/2010 Pasal 41 — kerahasiaan; Pasal 44 — diseminasi) ----
  - id: read
    resource: str-report
    effect: allow
    requires:
      - role: ppatk.analyst
      - row-policy: case.assignedTo == subject.id
  - id: read
    resource: ctr-report
    effect: allow
    requires:
      - role: ppatk.analyst
  - id: read
    resource: cbcc-report
    effect: allow
    requires:
      - role: ppatk.analyst
