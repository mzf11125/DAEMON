apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-base
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-100"   # run before any workload
spec:
  project: default
  source:
    repoURL: https://github.com/daemon-blockint-tech/DAEMON.git
    path: infra/kubernetes/overlays/staging
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: daemon-platform
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false   # base manifests create the namespaces
      - ApplyOutOfSyncOnly=true
