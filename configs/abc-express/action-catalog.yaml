# Versioned Action Catalog — all operational writes and AI agent actions must use these codes.
version: "0.1.0"
updatedAt: "2026-06-05"

actions:
  - code: resolve_location_conflict
    displayName: Resolve location conflict
    ownerSystem: ontology_core
    riskLevel: medium
    requiresApproval: true
    httpMethod: POST
    path: /v1/actions/resolve-location-conflict
    entityType: Location
    notes: Steward approval required for MDM conflict resolution.

  - code: link_contact_to_account
    displayName: Link contact to account
    ownerSystem: ontology_core
    riskLevel: medium
    requiresApproval: true
    httpMethod: POST
    path: /v1/actions/link-contact-to-account
    entityType: Contact
    notes: PII handling; confidence threshold before auto-link.

  - code: create_signal
    displayName: Create signal
    ownerSystem: ontology_core
    riskLevel: low
    requiresApproval: false
    httpMethod: POST
    path: /v1/actions/create-signal
