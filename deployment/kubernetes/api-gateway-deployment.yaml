apiVersion: apps/v1
kind: Deployment
metadata:
  name: daemon-api-gateway
  labels:
    app: daemon-api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: daemon-api-gateway
  template:
    metadata:
      labels:
        app: daemon-api-gateway
    spec:
      containers:
        - name: gateway
          image: daemon/api-gateway:0.1.0
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: POLICY_ENGINE_URL
              value: http://daemon-policy:8090
            - name: DAEMON_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: daemon-db
                  key: url
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: DAEMON_ONTOLOGY_QUERY_ENABLED
              value: "0"
            - name: DAEMON_NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: daemon-neo4j
                  key: uri
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: daemon-api-gateway
spec:
  selector:
    app: daemon-api-gateway
  ports:
    - port: 80
      targetPort: 3000
