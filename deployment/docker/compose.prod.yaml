# Production-oriented stack: Postgres (required), Redis, NATS, OTel, optional Neo4j.
# Usage: docker compose -f deployment/docker/compose.prod.yaml up -d
# Gateway/collect-sensing run on host or K8s; set DAEMON_POSTGRES_URL to postgres service.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-daemon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-daemon}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-daemon}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    ports:
      - "${NATS_PORT:-4222}:4222"

  otel-collector:
    image: otel/opentelemetry-collector:0.96.0
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ../../observability/tracing/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    profiles: ["graph"]
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/change-me-in-prod}
      NEO4J_PLUGINS: '[]'
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
