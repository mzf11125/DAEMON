environment: staging
database:
  url: ${DATABASE_URL}
  poolSize: 10
redis:
  url: ${REDIS_URL}
nats:
  url: ${NATS_URL}
gateway:
  url: https://staging.example.internal
  port: 3000
services:
  collectSensing: ${DAEMON_INGEST_URL}
  policyEngine: ${DAEMON_POLICY_URL}
observability:
  logLevel: info
  metrics: true
# Map readLoop flags to gateway process env in deploy (K8s/compose):
#   DAEMON_READ_FROM_PROJECTION=1  — serve reads from EntityReadModelProjection when present
#   DAEMON_READ_PARITY_CHECK=1       — compare projection vs registry each read; expose /metrics
readLoop:
  readFromProjection: true
  parityCheck: true
  env:
    DAEMON_READ_FROM_PROJECTION: "1"
    DAEMON_READ_PARITY_CHECK: "1"
