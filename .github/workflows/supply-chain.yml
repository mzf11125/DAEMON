# Phase 2 — SBOM generation + cosign verify hooks (digest-pinned images at deploy time).
name: supply-chain

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "pipelines/**"
      - "console-web/**"
      - ".github/workflows/supply-chain.yml"
  pull_request:
    paths:
      - "services/**"
      - "pipelines/**"
      - "console-web/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - platform-api
          - ontology-service
          - ingestion-service
          - rules-engine
          - case-service
          - audit-archival
    steps:
      - uses: actions/checkout@v4
      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM (filesystem scan for service)
        run: |
          svc="${{ matrix.image }}"
          path="services/$svc"
          if [ ! -d "$path" ]; then path="pipelines/$svc"; fi
          if [ ! -d "$path" ]; then echo "skip $svc — no source dir"; exit 0; fi
          syft scan "$path" -o spdx-json > "sbom-${svc}.spdx.json"
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-*.spdx.json
          if-no-files-found: ignore

  cosign-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify cosign policy file present
        run: |
          test -f docs/operations/cosign-image-policy-v1.md
          echo "cosign policy doc present — images must use digest + signature at GitOps sync (Phase 2 gate)."
