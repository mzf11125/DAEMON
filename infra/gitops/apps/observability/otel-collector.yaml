apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-50"
spec:
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.108.0
    helm:
      values: |
        mode: deployment
        replicaCount: 2
        image:
          repository: otel/opentelemetry-collector-contrib
        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
          processors:
            batch: {}
            memory_limiter:
              check_interval: 5s
              limit_percentage: 80
              spike_limit_percentage: 25
            attributes/redact:
              actions:
                - key: http.request.header.authorization
                  action: delete
                - key: http.request.header.cookie
                  action: delete
          exporters:
            prometheus:
              endpoint: 0.0.0.0:9464
            otlp/tempo:
              endpoint: tempo.daemon-observability.svc.cluster.local:4317
              tls:
                insecure: true
            loki:
              endpoint: http://loki.daemon-observability.svc.cluster.local:3100/loki/api/v1/push
          service:
            pipelines:
              traces:
                receivers: [otlp]
                processors: [memory_limiter, attributes/redact, batch]
                exporters: [otlp/tempo]
              metrics:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [prometheus]
              logs:
                receivers: [otlp]
                processors: [memory_limiter, attributes/redact, batch]
                exporters: [loki]
        ports:
          metrics:
            enabled: true
            containerPort: 9464
            servicePort: 9464
            protocol: TCP
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: daemon-observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
