apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-bridge
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: aip
  sources:
    - repoURL: https://github.com/daemon-blockint-tech/DAEMON.git
      path: infra/helm/agent-bridge
      targetRevision: main
      helm:
        releaseName: agent-bridge
        valueFiles:
          - values.yaml
          - values.staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: daemon-aip
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
