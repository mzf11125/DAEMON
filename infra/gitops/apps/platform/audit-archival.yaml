apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: audit-archival
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "30"
    daemon.platform/compliance: "soc2 iso27001 hipaa gdpr"
spec:
  project: platform
  sources:
    - repoURL: https://github.com/daemon-blockint-tech/DAEMON.git
      path: infra/helm/audit-archival
      targetRevision: main
      helm:
        releaseName: audit-archival
        valueFiles:
          - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: daemon-platform
  syncPolicy:
    automated:
      prune: false   # never auto-prune compliance workload
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
