# ABC Express production source systems (Phase 0 mobilization).
# Read-only registry — no credentials stored here.
version: "1.0"
updatedAt: "2026-06-05"

sourceSystems:
  - id: antero
    displayName: Antero
    repository: abc-express/antero-platform
    supabaseProject: Antero
    region: ap-southeast-1
    role: operational_core
    ownershipState: AUTHORITATIVE
    classification: operational_fact
    refreshSla: "15m"
    extractMethod: cdc_batch
    canonicalOwner:
      - Account
      - Order
      - Shipment
      - TTK
      - Trip
      - Manifest
      - Dispatch
      - ServiceAreaCoverage
    notes: >
      Primary operational ontology core candidate. POS/resi, manifest, dispatch,
      tracking, finance, master data.

  - id: abc-talk
    displayName: ABC Talk (Production)
    repository: abc-express/abc-talk
    supabaseProject: ABC Talk (Production)
    region: ap-southeast-1
    role: conversation_signal_source
    ownershipState: AUTHORITATIVE
    classification: conversation_event
    refreshSla: "5m"
    extractMethod: cdc_batch
    canonicalOwner:
      - Conversation
      - Activity
      - Signal
      - Contact
    notes: >
      WhatsApp CRM. Contact is channel identity, not legal Account master.

  - id: obl
    displayName: OBL Application
    repository: abc-express/abc-obl
    supabaseProject: OBL Application
    region: ap-southeast-1
    role: performance_consumer
    ownershipState: AUTHORITATIVE
    classification: performance_config
    refreshSla: "1d"
    extractMethod: batch
    canonicalOwner:
      - OBLScorecard
    notes: >
      Scorecard/KPI owner. Operational metrics consumed from semantic layer.

  - id: cms
    displayName: ABC CMS (Production)
    repository: abc-express/abc-cms
    supabaseProject: ABC CMS (Production)
    region: ap-southeast-1
    role: content_source
    ownershipState: REFERENCE_ONLY
    classification: marketing_content
    refreshSla: "1d"
    extractMethod: batch
    canonicalOwner:
      - Content
      - Campaign
    notes: >
      Strapi CMS. areas table is marketing taxonomy only — not operational coverage.

  - id: vendor-feed
    displayName: Vendor / External
    repository: null
    role: vendor_feed
    ownershipState: VENDOR_FEED
    classification: external_reference
    refreshSla: contract
    extractMethod: api_batch
    notes: BPS/Kemendagri codes, route/pricing vendors, Accurate integrations.
