environment: prod
database:
  url: ${DATABASE_URL}
  poolSize: 50
  ssl: true
redis:
  url: ${REDIS_URL}
nats:
  url: ${NATS_URL}
gateway:
  url: ${DAEMON_GATEWAY_URL}
  port: 3000
services:
  collectSensing: ${DAEMON_INGEST_URL}
  policyEngine: ${DAEMON_POLICY_URL}
observability:
  logLevel: warn
  metrics: true
  otelEndpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
neo4j:
  enabled: ${DAEMON_ONTOLOGY_QUERY_ENABLED:-0}
  uri: ${DAEMON_NEO4J_URI}
  user: ${DAEMON_NEO4J_USER:-neo4j}
security:
  enforceAuth: true
  requireTls: true
ingest:
  webhookHmacSecret: ${DAEMON_WEBHOOK_HMAC_SECRET}
  schedulePollSeconds: 60
lakehouse:
  exportBasePath: ${DAEMON_LAKEHOUSE_EXPORT_PATH:-/var/daemon/exports}
