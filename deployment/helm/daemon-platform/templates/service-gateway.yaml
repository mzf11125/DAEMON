apiVersion: v1
kind: Service
metadata:
  name: {{ include "daemon-platform.fullname" . }}-gateway
  labels:
    {{- include "daemon-platform.labels" . | nindent 4 }}
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: {{ .Values.gateway.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "daemon-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
