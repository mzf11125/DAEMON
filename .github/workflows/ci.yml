name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: go work sync || true
      - run: |
          for dir in packages/go-common packages/pipeline-runner infra/seed; do
            (cd "$dir" && go mod tidy && go vet . && go test ./...) || exit 1
          done
          for dir in services/platform-api services/ontology-service services/ingestion-service \
            services/rules-engine services/case-service \
            pipelines/raw-ingest pipelines/transforms pipelines/features pipelines/quality; do
            (cd "$dir" && go mod tidy && go build -o /dev/null ./cmd && go test ./...) || exit 1
          done
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: make ontology-sync
      - run: make ontology-validate
      - run: ./scripts/check-no-stub-handlers.sh
      - run: ./scripts/check-maturation-policy.sh
      - run: pnpm -r typecheck
      - run: pnpm --filter @daemon/ontology-language test
      - run: pnpm --filter @daemon/cli test || echo "cli test skipped if DB unavailable"
      - run: pnpm --filter @daemon/ontology-functions test
      - run: pnpm --filter @daemon/agent-service run lint

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: make ontology-sync
      - run: go work sync
      - run: make test-integration

  e2e-full:
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: go work sync
      - run: make up
      - run: make supabase-up
      - run: make migrate
      - run: make ontology-sync
      - run: |
          eval "$(supabase status -o env | tr -d '"')" || true
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="${ANON_KEY:-}"
          export SUPABASE_URL="${API_URL:-http://127.0.0.1:54331}"
          export E2E_FULL=1
          ./scripts/e2e-smoke.sh

  supply-chain:
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: |
          for dir in packages/go-common services/platform-api services/ontology-service \
            services/ingestion-service services/rules-engine services/case-service \
            pipelines/raw-ingest pipelines/transforms pipelines/features pipelines/quality infra/seed; do
            (cd "$dir" && govulncheck ./...) || exit 1
          done
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm audit --audit-level=high
        continue-on-error: true
