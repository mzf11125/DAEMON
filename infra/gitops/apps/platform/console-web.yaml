apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: console-web
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: platform
  sources:
    - repoURL: https://github.com/daemon-blockint-tech/DAEMON.git
      path: infra/helm/console-web
      targetRevision: main
      helm:
        releaseName: console-web
        valueFiles:
          - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: daemon-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
