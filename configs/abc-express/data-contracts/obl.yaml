source_system: obl
source_database: OBL Application
source_schema: public
owner: OBL App Owner
classification: performance_config
refresh_sla: "1d"
extract_method: batch
breaking_change_policy: OBL owner must notify data platform before KPI schema change

tables:
  - name: scorecards
    primary_key: id
    row_count_estimate: 105
    canonical_objects: [OBLScorecard]
    known_issues: config owner; inputs must come from semantic layer.

  - name: kpi_entries
    primary_key: id
    row_count_estimate: 587
    canonical_objects: [OBLMetricSnapshot]
    known_issues: reconcile against warehouse mart_obl__scorecard_inputs.

  - name: kpi_rollup_mappings
    primary_key: id
    row_count_estimate: 123
    canonical_objects: [OBLMetricSnapshot]
    known_issues: map organizations/users to canonical RO/Employee where possible.
