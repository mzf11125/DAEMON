name: AIP eval

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - "aip/**"
      - "packages/aip-agent/**"
      - "packages/go-common/**"
      - "services/ontology-service/**"
      - "services/platform-api/**"
      - "services/case-service/**"
      - ".github/workflows/aip-eval.yml"
      - "scripts/prove-aip-eval.sh"
  workflow_dispatch:

jobs:
  aip-eval:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: daemon
          POSTGRES_PASSWORD: daemon
          POSTGRES_DB: daemon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U daemon -d daemon"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/daemonneo4j
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p daemonneo4j 'RETURN 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 12
          --health-start-period 30s
    env:
      DATABASE_URL: postgresql://daemon:daemon@localhost:5432/daemon?sslmode=disable
      OIDC_REQUIRED: "false"
      ONTOLOGY_SERVICE_URL: http://localhost:8081
      PLATFORM_API_URL: http://localhost:8080
      CASE_SERVICE_URL: http://localhost:8084
      NEO4J_URI: neo4j://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: daemonneo4j
      ONTOLOGY_ROOT: ${{ github.workspace }}/ontology/v2-compiled
      TENANT_ID: tenant-demo
      EVAL_DETERMINISTIC: "true"
      EVAL_SKIP_BASELINE: "true"
      SKIP_NEO4J_SEED: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: make ontology-sync
      - name: Migrate and seed
        run: |
          psql "$DATABASE_URL" -f infra/migrations/postgres/001_init.sql
          psql "$DATABASE_URL" -f infra/migrations/postgres/002_indexes_fk.sql || true
          psql "$DATABASE_URL" -f infra/migrations/postgres/003_ingestion_params.sql || true
          psql "$DATABASE_URL" -f infra/migrations/postgres/004_supabase_compat_roles.sql
          psql "$DATABASE_URL" -f infra/migrations/postgres/005_authenticated_grants.sql
          psql "$DATABASE_URL" -f infra/migrations/postgres/006_p3_geo_attachments.sql
          cd infra/seed && SKIP_NEO4J_SEED=1 go run .
      - name: Start Go services
        run: |
          (cd services/platform-api && go run ./cmd) &
          (cd services/ontology-service && go run ./cmd) &
          (cd services/case-service && go run ./cmd) &
          ready=0
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8081/health \
              && curl -sf http://localhost:8080/health \
              && curl -sf http://localhost:8084/health; then
              ready=1
              break
            fi
            sleep 2
          done
          if [ "$ready" != "1" ]; then
            echo "aip-eval: platform/ontology/case services did not become healthy"
            exit 1
          fi
      - run: make aip-build
      - name: Golden eval
        run: make aip-eval
      - name: Agent bridge smoke (HTTP proxy to :8081)
        run: |
          export AGENT_DAEMON_BRIDGE=true
          export ONTOLOGY_SERVICE_URL=http://localhost:8081
          export PLATFORM_API_URL=http://localhost:8080
          pnpm --filter @daemon/agent-service exec tsx src/bridge-main.ts &
          bp=$!
          trap 'kill $bp 2>/dev/null || true' EXIT
          sleep 3
          ./scripts/smoke-agent-bridge.sh
