apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "daemon-platform.fullname" . }}-ingest
  labels:
    {{- include "daemon-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
spec:
  replicas: {{ .Values.ingest.replicas }}
  selector:
    matchLabels:
      {{- include "daemon-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ingest
  template:
    metadata:
      labels:
        {{- include "daemon-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ingest
    spec:
      containers:
        - name: ingest
          image: "{{ .Values.ingest.image.repository }}:{{ .Values.ingest.image.tag }}"
          imagePullPolicy: {{ .Values.ingest.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ingest.port }}
