  - id: abc-supabase-read
    enabled: false
    scope:
      tenantId: abc-antero
      domainId: logistics
    connector:
      type: postgres-read
      sql: |
        SELECT id::text AS shipment_id, COALESCE(reference, id::text) AS name, status
        FROM shipments
        LIMIT 500
    normalize:
