apiVersion: batch/v1
kind: Job
metadata:
  name: daemon-db-migrate
  labels:
    app: daemon-platform
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: daemon/data-platform:0.1.0
          command: ["node", "--import", "tsx", "data-platform/migrations/run-migrations.ts"]
          env:
            - name: DAEMON_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: daemon-db
                  key: url
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
