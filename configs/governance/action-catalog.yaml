  - id: read
    resource: sanctions-list
    effect: allow
  - id: write
    resource: sanctions-list
    effect: allow
    requires:
      - role: ppatk.compliance_lead
  - id: disseminate
    resource: disclosure
    effect: allow
    requires:
      - dual-approval
      - role: ppatk.deputy_director
      - chain-of-custody-sign
    onCommitted:
      - workflow: disclosure-egmont-export
        action: workflow.execute
      - workflow: disclosure-audit
        action: workflow.execute
  - id: read
    resource: wallet
    effect: allow
    requires:
