apiVersion: apps/v1
kind: Deployment
metadata:
  name: daemon-api-gateway
  labels:
    app: daemon-api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: daemon-api-gateway
  template:
    metadata:
      labels:
        app: daemon-api-gateway
    spec:
      containers:
        - name: gateway
          image: daemon/api-gateway:0.1.0
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: POLICY_ENGINE_URL
              value: http://daemon-policy:8090
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: daemon-api-gateway
spec:
  selector:
    app: daemon-api-gateway
  ports:
    - port: 80
      targetPort: 3000
