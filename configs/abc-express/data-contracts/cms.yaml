source_system: cms
source_database: ABC CMS (Production)
source_schema: public
owner: CMS / Marketing App Owner
classification: marketing_content
refresh_sla: "1d"
extract_method: batch
breaking_change_policy: CMS owner must notify data platform before content schema change

tables:
  - name: areas
    primary_key: id
    row_count_estimate: 114
    canonical_objects: [Location]
    ownership_state: REFERENCE_ONLY
    known_issues: marketing taxonomy only; map to canonical Location where applicable.

  - name: campaigns
    primary_key: id
    row_count_estimate: 428
    canonical_objects: [Campaign]
    known_issues: must not drive operational coverage claims.

  - name: blog_posts
    primary_key: id
    row_count_estimate: 226
    canonical_objects: [Content]
