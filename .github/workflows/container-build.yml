name: Container Build

on:
  push:
    branches: [main, master]
    paths:
      - "services/**/*.go"
      - "services/**/Dockerfile"
      - "packages/go-common/**"
      - "packages/dune-ingest/**"
      - "packages/pipeline-runner/**"
      - "apps/control-plane/**"
      - "go.work"
      - ".github/workflows/container-build.yml"
  pull_request:
    paths:
      - "services/**/*.go"
      - "services/**/Dockerfile"
      - "packages/go-common/**"
      - "packages/dune-ingest/**"
      - "packages/pipeline-runner/**"
      - "apps/control-plane/**"
      - "go.work"
      - ".github/workflows/container-build.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/daemon-blockint-tech/daemon

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: platform-api
            port: "8080"
          - name: ontology-service
            port: "8081"
          - name: ingestion-service
            port: "8082"
          - name: rules-engine
            port: "8083"
          - name: case-service
            port: "8084"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=daemon-${{ matrix.service.name }}
            org.opencontainers.image.vendor=daemon-blockint-tech
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service.name }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CGO_ENABLED=0

      - name: Generate SBOM
        if: github.event_name == 'push'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}@${{ steps.build.outputs.digest }}
          output-file: sbom-${{ matrix.service.name }}.spdx.json
          format: spdx-json

      - name: Upload SBOM artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service.name }}
          path: sbom-${{ matrix.service.name }}.spdx.json
          retention-days: 90

  control-plane:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/control-plane
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=daemon-control-plane
            org.opencontainers.image.vendor=daemon-blockint-tech

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/control-plane/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        if: github.event_name == 'push'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_PREFIX }}/control-plane@${{ steps.build.outputs.digest }}
          output-file: sbom-control-plane.spdx.json
          format: spdx-json

      - name: Upload SBOM artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-control-plane
          path: sbom-control-plane.spdx.json
          retention-days: 90

  sbom-summary:
    if: github.event_name == 'push'
    needs: [build-and-push, control-plane]
    runs-on: ubuntu-latest
    steps:
      - name: Download all SBOMs
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          merge-multiple: true
          path: sboms/

      - name: List SBOMs
        run: ls -lh sboms/
