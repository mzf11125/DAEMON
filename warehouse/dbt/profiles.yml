# Local/dev profile — override with env vars in CI/CD.
abc_express_redshift:
  target: dev
  outputs:
    dev:
      type: redshift
      host: "{{ env_var('REDSHIFT_HOST', 'localhost') }}"
      port: "{{ env_var('REDSHIFT_PORT', '5439') | int }}"
      user: "{{ env_var('REDSHIFT_USER', 'dbt') }}"
      password: "{{ env_var('REDSHIFT_PASSWORD', '') }}"
      dbname: "{{ env_var('REDSHIFT_DB', 'abc_warehouse') }}"
      schema: public
      threads: 4
