# Role → permission grants for gateway Authorizer (action ids from action-catalog).
roles:
  - role: admin
    permissions: ["*"]
  - role: platform-admin
    permissions: ["*"]
  - role: editor
    permissions: [read, write, query, ingest, chat, delete]
  - role: viewer
    permissions: [read, query]
  - role: ingest-webhook
    permissions: [ingest]
  - role: logistics-viewer
    permissions: [read, query]
  - role: commercial-analyst
    permissions: [read, query, chat]
  - role: logistics-editor
    permissions: [read, write, query, ingest]
  - role: abc-platform-admin
    permissions: ["*"]
