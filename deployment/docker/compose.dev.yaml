services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: daemon
      POSTGRES_PASSWORD: daemon
      POSTGRES_DB: daemon
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
  otel-collector:
    image: otel/opentelemetry-collector:0.96.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ../../observability/tracing/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: daemon
      MINIO_ROOT_PASSWORD: daemon-dev-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --overprovisioned
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://127.0.0.1:19092
    ports:
      - "19092:19092"

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/daemon-dev-neo4j
      NEO4J_PLUGINS: '[]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
  minio_data:
