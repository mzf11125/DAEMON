apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "daemon-platform.fullname" . }}-gateway
  labels:
    {{- include "daemon-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "daemon-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "daemon-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
          env:
            - name: DAEMON_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "daemon-platform.fullname" . }}-secrets
                  key: postgresUrl
                  optional: true
            - name: DAEMON_NATS_URL
              value: {{ .Values.nats.url | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
