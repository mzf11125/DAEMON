apiVersion: v1
kind: ResourceQuota
metadata:
  name: daemon-platform-quota
  namespace: daemon-platform
spec:
  hard:
    requests.cpu: "16"
    requests.memory: "32Gi"
    limits.cpu: "32"
    limits.memory: "64Gi"
    pods: "100"
    persistentvolumeclaims: "0"   # stateful workloads run on managed services
---
apiVersion: v1
kind: LimitRange
metadata:
  name: daemon-platform-limits
  namespace: daemon-platform
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "10m"
        memory: "32Mi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: daemon-aip-quota
  namespace: daemon-aip
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    pods: "30"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: daemon-observability-quota
  namespace: daemon-observability
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "32Gi"
    limits.cpu: "16"
    limits.memory: "64Gi"
    pods: "50"
