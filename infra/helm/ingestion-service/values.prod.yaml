replicaCount: 2
image:
  repository: ghcr.io/daemon-blockint-tech/ingestion-service
  digest: ""
  tag: "0.1.0"
  pullPolicy: IfNotPresent
config:
  httpPort: "8082"
  oidcRequired: "true"
  logLevel: "info"
service:
  type: ClusterIP
  port: 8082
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
