source_system: abc-talk
source_database: ABC Talk (Production)
source_schema: public
owner: Commercial / ABC Talk App Owner
classification: conversation_event
refresh_sla: "5m"
extract_method: cdc_batch
breaking_change_policy: app owner must notify data platform before schema change

tables:
  - name: contacts
    primary_key: id
    natural_keys: [wa_id, phone]
    row_count_estimate: 821
    pii_fields: [name, phone, wa_id, email]
    canonical_objects: [Contact]
    known_issues: contact is channel identity; not Account master.

  - name: conversations
    primary_key: id
    canonical_objects: [Conversation]
    known_issues: assignment/ownership changes are Activity sources.

  - name: messages
    primary_key: id
    row_count_estimate: 16631
    canonical_objects: [Conversation, Activity]
    known_issues: event lag monitored for lead_response_sla metric.

  - name: location_resolutions
    primary_key: id
    row_count_estimate: 194
    canonical_objects: [Location]
    known_issues: contributing fuzzy aliases for customer language.

  - name: bot_tariffs
    primary_key: id
    row_count_estimate: 7631
    canonical_objects: [ServiceAreaCoverage]
    known_issues: tariff rows reference origin/destination aliases.
