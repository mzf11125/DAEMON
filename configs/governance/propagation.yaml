      - neo4j-graph-sync
  - id: link-patch
    trigger: patch
    entityTypes: [Link]
    propagate:
      - read-model-projection
      - graph-edge-sync
      - neo4j-graph-sync
  - id: default-register
    trigger: register
    propagate:
      - read-model-projection
      - neo4j-graph-sync
      - semantic-vector-index
      - lakehouse-bronze
      - lakehouse-silver
  - id: default-patch
    trigger: patch
    propagate:
      - read-model-projection
      - audit-loop
      - neo4j-graph-sync
      - semantic-vector-index
      - lakehouse-bronze
      - lakehouse-silver
  - id: logistics-entity-register
    trigger: register
