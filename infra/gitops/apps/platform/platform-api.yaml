apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-api
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: platform
  sources:
    - repoURL: https://github.com/daemon-blockint-tech/DAEMON.git
      path: infra/helm/platform-api
      targetRevision: main
      helm:
        releaseName: platform-api
        valueFiles:
          - values.yaml
          - values.staging.yaml   # staging overlay; prod overlay swaps via Application CRD per env cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: daemon-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
      - Validate=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
