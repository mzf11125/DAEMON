name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: go work sync || true
      - run: |
          for dir in packages/go-common packages/pipeline-runner \
            services/platform-api services/ontology-service services/ingestion-service \
            services/rules-engine services/case-service \
            pipelines/raw-ingest pipelines/transforms pipelines/features pipelines/quality \
            infra/seed; do
            (cd "$dir" && go mod tidy && go build -o /dev/null ./cmd) || exit 1
          done
      - run: |
          for dir in packages/go-common packages/pipeline-runner \
            services/platform-api services/ontology-service services/ingestion-service \
            services/rules-engine services/case-service \
            pipelines/raw-ingest pipelines/transforms pipelines/features pipelines/quality \
            infra/seed; do
            (cd "$dir" && go test ./...) || exit 1
          done
      - run: ./scripts/validate-ontology.sh
      - run: ./scripts/check-no-stub-handlers.sh
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm -r typecheck
      - run: pnpm --filter @daemon/ontology-functions test

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go work sync
      - run: make test-integration

  e2e-full:
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: go work sync
      - run: make supabase-up
      - run: |
          eval "$(supabase status -o env | tr -d '"')" || true
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="${ANON_KEY:-}"
          export SUPABASE_URL="${API_URL:-http://127.0.0.1:54331}"
          export E2E_FULL=1
          ./scripts/e2e-smoke.sh
