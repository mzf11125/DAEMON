# MDM survivorship rules (Phase 1 pilot — Location and ServiceAreaCoverage).
version: "1.0"

rules:
  - entityType: Location
    fieldName: canonical_name
    priorityOrder:
      - bps_reference
      - antero
      - abc-talk
      - cms
    fallbackRule: manual_review
    manualReviewThreshold: 0.9

  - entityType: Location
    fieldName: province_name
    priorityOrder:
      - bps_reference
      - antero
    fallbackRule: manual_review
    manualReviewThreshold: 0.9

  - entityType: ServiceAreaCoverage
    fieldName: coverage_status
    priorityOrder:
      - antero
      - ontology_core
    fallbackRule: manual_review
    manualReviewThreshold: 1.0

  - entityType: Account
    fieldName: legal_name
    priorityOrder:
      - antero
      - abc-talk
    fallbackRule: manual_review
    manualReviewThreshold: 0.95

  - entityType: Contact
    fieldName: display_name
    priorityOrder:
      - abc-talk
      - antero
    fallbackRule: abc-talk
    manualReviewThreshold: 0.85
