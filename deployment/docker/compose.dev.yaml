services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: daemon
      POSTGRES_PASSWORD: daemon
      POSTGRES_DB: daemon
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
  otel-collector:
    image: otel/opentelemetry-collector:0.96.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ../../observability/tracing/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
