# Declarative action types for governed writes (O2 parity — ontology Action Types).
# Patches must include actionType matching the target entity when enforced.
actionTypes:
  - id: tp-routing-decision
    entityType: RoutingDecision
    description: Three-step pricing routing decision write
    requiredPatchKeys:
      - decisionType
    logicRuleId: tp-routing-decision
    logicPack: logistics-commercial
  - id: tp-price-simulation
    entityType: RoutingDecision
    description: Read-only pricing simulation marker (no OLTP write-back)
    requiredPatchKeys:
      - decisionType
    logicRuleId: tp-price-simulation
    logicPack: logistics-commercial
